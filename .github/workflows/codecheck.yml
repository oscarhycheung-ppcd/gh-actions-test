name: Code Check

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - ready_for_review
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      checks: write

    defaults:
      run:
        shell: bash
    steps:
      - name: Print GitHub context
        run: |
          echo "Current GitHub context:"
          echo "${{ toJson(github) }}"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read random.txt
        id: read_random
        run: |
          if [ -f random.txt ]; then
            echo "random.txt exists. Contents:"
            cat random.txt
          else
            echo "random.txt does not exist."
          fi

      - name: Create a commit status
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Running in workflow_dispatch mode');

            const { github, context } = require('@actions/github');
            const commitSha = context.sha;

            try {
              // Create a new commit status for the current commit
              const status = await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: commitSha,
                state: 'success',
                context: 'Code Check',
                description: 'The code check has passed successfully.',
                target_url: context.payload.workflow_run.html_url,
              });
              console.log('Commit status created:', status.data);
            } catch (error) {
              console.error('Error creating commit status:', error);
              throw error;
            }
