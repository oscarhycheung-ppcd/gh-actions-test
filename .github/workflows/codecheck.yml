name: Code Check

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - ready_for_review
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      checks: write

    defaults:
      run:
        shell: bash
    steps:
      - name: Print GitHub context
        run: |
          echo "Current GitHub context:"
          echo "${{ toJson(github) }}"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read random.txt
        id: read_random
        run: |
          if [ -f random.txt ]; then
            echo "random.txt exists. Contents:"
            cat random.txt
          else
            echo "random.txt does not exist."
          fi

      - name: Update pull request status
        if: github.event_name == 'workflow_dispatch'
        id: update_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Running in workflow_dispatch mode');

            // For workflow_dispatch events, we need to determine the current branch
            let currentBranch;

            if (context.ref && context.ref.startsWith('refs/heads/')) {
              currentBranch = context.ref.replace('refs/heads/', '');
            } else if (context.payload && context.payload.ref) {
              currentBranch = context.payload.ref.replace('refs/heads/', '');
            } else {
              console.log('Could not determine branch from context. Using default branch.');
              currentBranch = 'main';
            }

            console.log(`Working with branch: ${currentBranch}`);
            console.log('Context ref:', context.ref);

            try {
              const { data: pullRequests } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${currentBranch}`,
              });

              const checkCreatePromises = pullRequests.map((pullRequest) => {
                console.log(`Updating PR #${pullRequest.number}`);
                return github.rest.checks.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'Code Check',
                  head_sha: pullRequest.head.sha,
                  status: 'completed',
                  conclusion: 'success',
                  output: {
                    title: 'Code Check Passed',
                    summary: 'The code check has passed successfully.',
                    text: `PR #${pullRequest.number} passed the code check.`
                  },
                  details_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  ref: `refs/pull/${pullRequest.number}/head`
                }));
              });

              if (checkCreatePromises.length === 0) {
                console.log('No open pull requests found for the current branch.');
                return;
              }
                
              // Wait for all check creation promises to resolve
              await Promise.all(checkCreatePromises);
              console.log('Successfully created all status checks');
            } catch (error) {
              console.error('Error in GitHub script:', error);
              core.setFailed(`GitHub script error: ${error.message}`);
            }
