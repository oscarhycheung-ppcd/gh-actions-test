name: Code Check

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - ready_for_review
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      checks: write

    defaults:
      run:
        shell: bash
    steps:
      - name: Print GitHub context
        run: |
          echo "Current GitHub context:"
          echo "${{ toJson(github) }}"
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read random.txt
        id: read_random
        run: |
          if [ -f random.txt ]; then
            echo "random.txt exists. Contents:"
            cat random.txt
          else
            echo "random.txt does not exist."
          fi

      - name: Update pull request status
        if: github.event_name == 'workflow_dispatch'
        id: update_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            # Get the pull requests which are open and with this branch
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.pull_request.head.ref}`,
            });

            if (pullRequests.length === 0) {
              console.log('No open pull requests found for this branch.');
              return;
            }

            for (const pullRequest of pullRequests) {
              // Update the pull request's check status to success
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Code Check',
                head_sha: pullRequest.head.sha,
                status: 'completed',
                conclusion: 'success',
                output: {
                  title: 'Code Check Passed',
                  summary: 'The code check has passed successfully.',
                },
              });
            }
