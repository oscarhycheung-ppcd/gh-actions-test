name: Codegen

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  code-gen:
    permissions:
      contents: write
      pull-requests: write
      actions: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print GitHub context
        run: |
          echo "Current GitHub context:"
          echo "${{ toJson(github) }}"

      - name: Create a branch with datetime
        run: |
          random_string=$(openssl rand -hex 3)
          branch_name="branch-$(date +'%Y%m%d%H%M%S')-$random_string"
          echo "BRANCH_NAME=$branch_name" >> $GITHUB_ENV
          echo "RANDOM_STRING=$random_string" >> $GITHUB_ENV

      - name: Add a random string to ./random.txt
        run: |
          echo "$RANDOM_STRING" >> random.txt
          echo "Added random string: $RANDOM_STRING to random.txt"

      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Add random string to random.txt",
              body: "This PR adds a random string to random.txt",
              head: "${{ env.BRANCH_NAME }}",
              base: "main",
              draft: false
            });

            core.setOutput('pull-request-number', pr.number);
            core.setOutput('pull-request-url', pr.html_url);
            console.log(`Pull Request created: ${pr.html_url}`);

      - name: Trigger CodeCheck workflow
        if: steps.create-pr.outputs.pull-request-number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'codecheck.yml',
              ref: '${{ env.BRANCH_NAME }}',
            });
